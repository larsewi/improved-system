syntax = "proto3";

package patch;

import "delta.proto";
import "injected.proto";
import "table.proto";
import "google/protobuf/timestamp.proto";

// Patch represents the merged diff between two blocks in the chain.
message Patch {
  // The hash of the most recent block in the chain (HEAD).
  string head = 1;
  // Timestamp when the HEAD block was created.
  google.protobuf.Timestamp created = 2;
  // Static fields injected into all SQL output (extra columns in INSERT, conditions in WHERE).
  repeated injected.Field injected_fields = 3;
  // The number of blocks that were merged to produce this patch.
  uint32 num_blocks = 4;
  // Tables with incremental changes (each Delta carries its own table_name).
  repeated delta.Delta deltas = 5;
  // Tables requiring a full state snapshot (each Table carries its own table_name).
  repeated table.Table states = 6;
}
